<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debt Tracker - GitHub Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Anuphan', sans-serif; }</style>
</head>
<body class="bg-gray-100 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-lg flex flex-col">
        <div class="bg-indigo-700 p-6 text-white rounded-b-3xl">
            <h1 class="text-xl font-bold">ระบบติดตามหนี้ (GitHub)</h1>
            <p class="text-xs opacity-75">เชื่อมต่อ Google Sheets API</p>
        </div>

        <div class="p-5 space-y-4">
            <input type="text" id="search" onkeyup="filter()" placeholder="ค้นหาชื่อ/CA..." class="w-full p-4 bg-gray-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <select id="caSelect" onchange="updateInfo()" class="w-full p-4 border rounded-2xl font-bold bg-white"></select>

            <div class="bg-indigo-50 p-5 rounded-3xl border border-indigo-100">
                <p class="text-[10px] font-bold text-indigo-600 uppercase">ยอดขาด/ค้างปัจจุบัน</p>
                <p id="debtDisplay" class="text-3xl font-black text-gray-800">0.00</p>
                <p id="nameDisplay" class="text-xs text-indigo-400 font-bold mt-1"></p>
            </div>

            <form id="debtForm" class="space-y-4">
                <input type="number" id="amt" placeholder="ชำระครั้งนี้" class="w-full p-4 border rounded-2xl text-xl font-bold text-indigo-600">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="date" class="p-3 bg-gray-50 rounded-xl text-xs border-none">
                    <input type="text" id="staff" placeholder="รหัสพนักงาน" class="p-3 bg-gray-50 rounded-xl text-xs border-none">
                </div>
                <textarea id="note" placeholder="รายละเอียด..." class="w-full p-3 bg-gray-50 rounded-xl text-xs border-none" rows="2"></textarea>
                
                <button type="button" onclick="getLoc()" class="w-full py-3 bg-white text-indigo-600 rounded-xl text-xs font-bold border border-indigo-200 shadow-sm">
                    <i class="fas fa-location-dot mr-1"></i> <span id="locLabel">ปักหมุดพิกัด</span>
                </button>
                <input type="hidden" id="locVal">

                <div class="relative border-2 border-dashed rounded-2xl p-4 text-center text-gray-400">
                    <input type="file" id="pic" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer">
                    <div id="picPreview"><i class="fas fa-camera text-xl mb-1"></i><p class="text-[10px] font-bold">แนบรูปถ่าย</p></div>
                </div>

                <button type="button" onclick="saveData()" class="w-full bg-indigo-600 text-white font-bold py-5 rounded-3xl shadow-lg active:scale-95 transition-all">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-black/60 hidden flex flex-col items-center justify-center text-white z-50">
        <div class="w-10 h-10 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold">กำลังเชื่อมต่อระบบ...</p>
    </div>

    <script>
        // *** สำคัญ: นำ URL จาก Google Deploy มาใส่ที่นี่ ***
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby9VZLXRPnEBGA-aH51HYyRuIyFCSxXxCUqITcXx6wvx_CQyVlCcTgrt7QkRVGyAXhmog/exec'; 
        let db = [];

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            showLoader(true);
            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    db = data;
                    renderSelect(db);
                    showLoader(false);
                })
                .catch(err => alert("โหลดข้อมูลล้มเหลว: " + err));
        };

        function renderSelect(data) {
            const s = document.getElementById('caSelect');
            s.innerHTML = '<option value="">-- เลือก CA --</option>';
            data.forEach(i => {
                const o = document.createElement('option');
                o.value = i.ca;
                o.textContent = `CA: ${i.ca} | ${i.name}`;
                s.appendChild(o);
            });
        }

        function filter() {
            const v = document.getElementById('search').value.toLowerCase();
            renderSelect(db.filter(i => i.ca.includes(v) || i.name.toLowerCase().includes(v)));
        }

        function updateInfo() {
            const item = db.find(i => i.ca === document.getElementById('caSelect').value);
            document.getElementById('debtDisplay').innerText = item ? item.debt.toLocaleString() : "0.00";
            document.getElementById('nameDisplay').innerText = item ? "ลูกค้า: " + item.name : "";
        }

      function getLoc() {
    const l = document.getElementById('locLabel');
    const d = document.getElementById('locDisplay'); // ส่วนที่ใช้แสดงตัวเลข
    
    if (!navigator.geolocation) {
        alert("เบราว์เซอร์ไม่รองรับ GPS");
        return;
    }

    l.innerText = "กำลังค้นหาพิกัด...";
    
    navigator.geolocation.getCurrentPosition(
        (p) => {
            const lat = p.coords.latitude.toFixed(6);
            const lng = p.coords.longitude.toFixed(6);
            const coords = `${lat}, ${lng}`;
            
            // 1. บันทึกค่าลงตัวแปรซ่อน (เพื่อส่งไป Sheet)
            document.getElementById('locVal').value = coords;
            
            // 2. เปลี่ยนข้อความบนปุ่ม
            l.innerText = "ดึงพิกัดสำเร็จ ✅";
            
            // 3. แสดงตัวเลขบนหน้าจอ (จุดที่ต้องแก้)
            if (d) {
                d.innerText = "พิกัดปัจจุบัน: " + coords;
                d.classList.remove('hidden'); // แสดง Element ออกมา
                d.style.display = "block";    // มั่นใจว่าไม่ถูกซ่อน
            }
        }, 
        (err) => {
            alert("แจ้งพิกัดล้มเหลว: " + err.message);
            l.innerText = "ปักหมุดล้มเหลว ❌";
        }, 
        { enableHighAccuracy: true, timeout: 10000 }
    );
}

        document.getElementById('pic').onchange = function() {
            if(this.files[0]) document.getElementById('picPreview').innerHTML = `<p class="text-indigo-600 text-xs font-bold">${this.files[0].name}</p>`;
        };

        function saveData() {
            const file = document.getElementById('pic').files[0];
            const p = {
                ca: document.getElementById('caSelect').value,
                paymentAmount: document.getElementById('amt').value,
                paymentDate: document.getElementById('date').value,
                details: document.getElementById('note').value,
                location: document.getElementById('locVal').value,
                staffId: document.getElementById('staff').value
            };

            if(!p.ca || !p.paymentAmount || !p.location) return alert("กรุณากรอกข้อมูลให้ครบ");

            showLoader(true);
            if (file) {
                const r = new FileReader();
                r.readAsDataURL(file);
                r.onload = () => {
                    p.photoData = r.result.split(',')[1];
                    p.photoType = file.type;
                    p.photoName = file.name;
                    send(p);
                };
            } else { send(p); }
        }

        function send(p) {
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(p) })
                .then(res => res.json())
                .then(res => {
                    showLoader(false);
                    if(res.status === "success") {
                        alert("✅ บันทึกสำเร็จ!\nยอดคงเหลือ: " + res.newDebt + " บาท");
                        location.reload();
                    } else { alert("❌ ผิดพลาด: " + res.message); }
                })
                .catch(err => { showLoader(false); alert("Error: " + err); });
        }

        function showLoader(v) { document.getElementById('loader').style.display = v ? 'flex' : 'none'; }
    </script>
</body>
</html>
