<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Tracker v6.9.3</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/cite:all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Anuphan', sans-serif; touch-action: manipulation; }
        .img-preview { max-width: 100px; max-height: 100px; border-radius: 8px; border: 2px solid #e5e7eb; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        <div class="bg-indigo-900 p-6 text-white rounded-b-[2.5rem] shadow-lg text-center sticky top-0 z-40">
            <h1 class="text-xl font-bold italic text-amber-400">DEBT TRACKER v6.9.3</h1>
            <p class="text-[10px] opacity-70 uppercase tracking-widest font-bold">Fixing Data Sync</p>
        </div>

        <div class="p-5 space-y-4 flex-1">
            <select id="officeSelect" onchange="onOfficeChange()" class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl font-bold text-indigo-900 outline-none">
                <option value="">-- เลือกสำนักงาน --</option>
            </select>

            <div id="countSection" class="opacity-40 pointer-events-none transition-all duration-300">
                <select id="countSelect" onchange="onCountChange()" class="w-full p-4 bg-white border-2 border-indigo-50 rounded-2xl font-bold text-gray-700 outline-none">
                    <option value="">-- เลือกจำนวนฉบับ --</option>
                </select>
            </div>

            <div id="caSection" class="space-y-2 opacity-40 pointer-events-none transition-all duration-300">
                <div class="flex gap-2">
                    <input type="text" id="search" onkeyup="filterCA()" placeholder="ค้นหา..." class="flex-1 p-4 bg-gray-50 border rounded-2xl outline-none">
                    <button type="button" onclick="showCustomerDetails()" class="bg-amber-500 text-white px-5 rounded-2xl shadow-md"><i class="fas fa-file-invoice"></i></button>
                </div>
                <select id="caSelect" onchange="updateDebtDisplay()" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold text-gray-700 bg-white outline-none">
                    <option value="">-- เลือก CA --</option>
                </select>
            </div>

            <div class="bg-gradient-to-br from-indigo-50 to-white p-5 rounded-3xl border border-indigo-100 text-center">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-1">ยอดค้างปัจจุบัน</p>
                <span id="debtDisplay" class="text-4xl font-black text-gray-800">0.00</span>
                <p id="nameDisplay" class="text-sm text-indigo-500 font-bold mt-2"></p>
            </div>

            <form id="debtForm" class="space-y-4">
                <input type="number" id="amt" placeholder="ชำระครั้งนี้" inputmode="decimal" class="w-full p-4 border rounded-2xl text-xl font-bold text-indigo-700 outline-none">
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="date" class="p-3 bg-gray-50 rounded-xl text-xs">
                    <input type="text" id="staff" placeholder="รหัสพนักงาน *" class="p-3 bg-gray-50 rounded-xl text-xs">
                </div>
                <textarea id="note" placeholder="รายละเอียด..." class="w-full p-3 bg-gray-50 rounded-xl text-xs" rows="2"></textarea>
                <button type="button" onclick="getLoc()" class="w-full py-3 bg-white text-indigo-700 rounded-xl text-xs font-bold border border-indigo-100 shadow-sm"><i class="fas fa-location-dot mr-1"></i> <span id="locLabel">ปักหมุดตำแหน่ง *</span></button>
                <input type="hidden" id="locVal">
                <div id="photoContainer" class="relative border-2 border-dashed border-rose-300 bg-rose-50 rounded-2xl p-4 text-center">
                    <input type="file" id="pic" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    <div id="picPreview" class="text-rose-500 py-1"><i class="fas fa-camera text-2xl mb-1"></i><p class="text-[10px] font-bold">ถ่ายรูปหลักฐาน *</p></div>
                </div>
                <button type="button" onclick="saveData()" class="w-full bg-indigo-700 text-white font-black py-5 rounded-[2rem] shadow-xl text-lg">บันทึกรายงาน</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] max-h-[90vh] flex flex-col overflow-hidden shadow-2xl">
            <div id="modalBody" class="p-6 overflow-y-auto space-y-2 text-sm"></div>
            <div class="p-4 bg-gray-50 flex gap-2">
                <button onclick="exportToPDF()" class="flex-1 bg-rose-600 text-white py-3 rounded-2xl font-bold"><i class="fas fa-file-pdf"></i> PDF</button>
                <button onclick="closeModal()" class="flex-1 bg-slate-200 text-slate-700 py-3 rounded-2xl font-bold">ปิด</button>
            </div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-indigo-900/60 hidden flex flex-col items-center justify-center text-white z-[100]"><div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div><p class="mt-4 font-bold tracking-widest animate-pulse">กำลังสื่อสารกับฐานข้อมูล...</p></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBO4Vk6wdkwGT7CXMqnbJ8oseF01IC6mXsFovr-BK5KU3KiyXOXsyCA7ImsQ-COBSioA/exec'; 
        let rawData = []; let filteredByOffice = []; let filteredByCount = [];

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            showLoader(true);
            fetch(SCRIPT_URL).then(res => res.json()).then(data => { rawData = data; populateOffice(data); showLoader(false); }).catch(() => { showLoader(false); alert("⚠️ โหลดฐานข้อมูลล้มเหลว"); });
        };

        function populateOffice(data) {
            const select = document.getElementById('officeSelect');
            const offices = [...new Set(data.map(i => i.office))].sort();
            select.innerHTML = '<option value="">-- เลือกสำนักงาน --</option>';
            offices.forEach(off => { const opt = document.createElement('option'); opt.value = off; opt.textContent = off; select.appendChild(opt); });
        }

        function onOfficeChange() {
            const office = document.getElementById('officeSelect').value;
            const countSection = document.getElementById('countSection');
            if (office) {
                filteredByOffice = rawData.filter(i => i.office === office);
                countSection.classList.remove('opacity-40', 'pointer-events-none');
                const counts = [...new Set(filteredByOffice.map(i => i.count))].sort((a,b) => a-b);
                const cSelect = document.getElementById('countSelect');
                cSelect.innerHTML = '<option value="">-- เลือกจำนวนฉบับ --</option>';
                counts.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c + " ฉบับ"; cSelect.appendChild(opt); });
            }
        }

        function onCountChange() {
            const count = document.getElementById('countSelect').value;
            const caSection = document.getElementById('caSection');
            if (count) {
                filteredByCount = filteredByOffice.filter(i => i.count === count);
                caSection.classList.remove('opacity-40', 'pointer-events-none');
                renderCA(filteredByCount);
            }
        }

        function renderCA(data) {
            const select = document.getElementById('caSelect');
            select.innerHTML = '<option value="">-- เลือก CA --</option>';
            data.forEach(i => { const opt = document.createElement('option'); opt.value = i.ca; opt.textContent = `CA: ${i.ca} | ${i.name}`; select.appendChild(opt); });
        }

        function filterCA() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = filteredByCount.filter(i => i.ca.toLowerCase().includes(term) || i.name.toLowerCase().includes(term));
            renderCA(filtered);
        }

        function updateDebtDisplay() {
            const ca = document.getElementById('caSelect').value;
            const found = filteredByCount.find(i => i.ca === ca);
            document.getElementById('debtDisplay').innerText = found ? found.debt.toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
            document.getElementById('nameDisplay').innerText = found ? "ลูกค้า: " + found.name : "";
        }

        function showCustomerDetails() {
            const ca = document.getElementById('caSelect').value;
            if (!ca) return alert("⚠️ เลือก CA ก่อนครับ");
            const found = filteredByCount.find(i => i.ca === ca);
            const body = document.getElementById('modalBody');
            let html = `<div id="pdf-area"><h2 style="color:#1e1b4b; font-size:18px; font-weight:bold; margin-bottom:15px; border-bottom:2px solid #fbbf24;">ข้อมูล CA: ${ca}</h2>`;
            for (const [key, value] of Object.entries(found.fullDetails)) {
                let val = value;
                if (typeof value === 'string' && value.includes('drive.google.com')) {
                    let fileId = value.includes('id=') ? value.split('id=')[1] : value.split('/file/d/')[1]?.split('/')[0];
                    if (fileId) val = `<img src="https://drive.google.com/uc?export=view&id=${fileId}" class="img-preview" onclick="window.open('${value}', '_blank')">`;
                }
                html += `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #f3f4f6; padding:8px 0;"><span style="color:#9ca3af; font-size:9px; font-weight:bold;">${key}</span><span style="color:#1f2937; font-weight:bold;">${val}</span></div>`;
            }
            body.innerHTML = html + "</div>";
            document.getElementById('detailModal').classList.remove('hidden');
        }

        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); }

        function getLoc() {
            const l = document.getElementById('locLabel');
            if (navigator.geolocation) {
                l.innerText = "กำลังหาพิกัด...";
                navigator.geolocation.getCurrentPosition(p => {
                    const coords = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                    document.getElementById('locVal').value = coords;
                    l.innerText = "ปักหมุดสำเร็จ ✅";
                }, () => alert("❌ ดึงพิกัดไม่ได้"), {enableHighAccuracy: true});
            }
        }

        document.getElementById('pic').onchange = function() {
            if(this.files[0]) document.getElementById('picPreview').innerHTML = `<i class='fas fa-check-circle text-emerald-500 text-2xl mb-1'></i><p class='text-[10px] font-bold text-emerald-600'>เลือกรูปแล้ว: ${this.files[0].name}</p>`;
        };

        function saveData() {
            const file = document.getElementById('pic').files[0];
            const staffId = document.getElementById('staff').value.trim();
            const location = document.getElementById('locVal').value;
            const ca = document.getElementById('caSelect').value;
            const amount = document.getElementById('amt').value;

            if(!ca || !amount || !staffId || !location || !file) return alert("⚠️ ข้อมูลไม่ครบ!");

            showLoader(true);
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => {
                const payload = {
                    ca: ca, paymentAmount: amount, paymentDate: document.getElementById('date').value,
                    details: document.getElementById('note').value, staffId: staffId, location: location,
                    photoData: reader.result.split(',')[1], photoType: file.type, photoName: file.name
                };
                fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) })
                .then(res => res.json()).then(res => {
                    showLoader(false);
                    if(res.status === "success") { alert("✅ บันทึกสำเร็จ!"); location.reload(); }
                    else { alert("❌ " + res.message); }
                }).catch(err => { showLoader(false); alert("❌ " + err); });
            };
        }
        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
