<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Tracker v6.9.5</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Anuphan', sans-serif; touch-action: manipulation; }
        .modal-open { overflow: hidden; }
        .img-preview { max-width: 60px; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col relative">
        <div class="bg-indigo-900 p-6 text-white rounded-b-[2rem] shadow-lg text-center sticky top-0 z-50">
            <h1 class="text-xl font-bold italic text-amber-400">DEBT TRACKER v6.9.5</h1>
            <p class="text-[10px] opacity-70 uppercase tracking-widest font-bold">Data First & Reliability System</p>
        </div>

        <div class="p-5 space-y-4 flex-1">
            <select id="officeSelect" onchange="onOfficeChange()" class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl font-bold text-indigo-900 outline-none">
                <option value="">-- 1. เลือกสำนักงาน --</option>
            </select>

            <div id="countSection" class="opacity-40 pointer-events-none transition-all">
                <select id="countSelect" onchange="onCountChange()" class="w-full p-4 bg-white border-2 border-indigo-50 rounded-2xl font-bold text-gray-700 outline-none">
                    <option value="">-- 2. เลือกจำนวนฉบับ --</option>
                </select>
            </div>

            <div id="caSection" class="space-y-2 opacity-40 pointer-events-none transition-all">
                <div class="flex gap-2">
                    <input type="text" id="search" onkeyup="filterCA()" placeholder="ค้นหา CA / ชื่อ..." class="flex-1 p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                    <button type="button" onclick="showCustomerDetails()" class="bg-amber-500 text-white px-4 rounded-2xl shadow-md active:scale-95 transition">
                        <i class="fas fa-search-plus"></i>
                    </button>
                </div>
                <select id="caSelect" onchange="updateDebtDisplay()" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold text-gray-700 bg-white outline-none">
                    <option value="">-- 3. เลือกหมายเลข CA --</option>
                </select>
            </div>

            <div class="bg-gradient-to-br from-indigo-50 to-white p-5 rounded-3xl border border-indigo-100 text-center shadow-sm">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-1">ยอดค้างชำระ (คอลัมน์ AD)</p>
                <span id="debtDisplay" class="text-4xl font-black text-gray-800">0.00</span>
                <p id="nameDisplay" class="text-sm text-indigo-500 font-bold mt-2"></p>
            </div>

            <form id="debtForm" class="space-y-4">
                <input type="number" id="amt" placeholder="ระบุจำนวนเงินที่รับชำระ" inputmode="decimal" class="w-full p-4 border-2 border-slate-100 rounded-2xl text-xl font-bold text-indigo-700 outline-none focus:border-indigo-500">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="date" required class="p-3 bg-gray-50 rounded-xl text-xs border-none outline-none">
                    <input type="text" id="staff" placeholder="รหัสพนักงาน *" required class="p-3 bg-gray-50 rounded-xl text-xs border-none outline-none focus:ring-2 focus:ring-indigo-500">
                </div>

                <textarea id="note" placeholder="บันทึกรายละเอียดการลงพื้นที่..." class="w-full p-3 bg-gray-50 rounded-xl text-xs border-none outline-none" rows="2"></textarea>

                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                    <button type="button" onclick="getLoc()" class="w-full py-3 bg-white text-indigo-700 rounded-xl text-xs font-bold border border-indigo-100 shadow-sm active:scale-95 transition flex items-center justify-center gap-2">
                        <i class="fas fa-location-dot text-rose-500"></i> <span id="locLabel">กดแจ้งพิกัดปัจจุบัน *</span>
                    </button>
                    <input type="hidden" id="locVal">
                </div>

                <div id="photoContainer" class="relative border-2 border-dashed border-rose-300 bg-rose-50 rounded-2xl p-4 text-center transition-all duration-300">
                    <input type="file" id="pic" accept="image/*" capture="environment" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    <div id="picPreview" class="text-rose-500 py-1">
                        <i class="fas fa-camera text-2xl mb-1"></i>
                        <p class="text-[10px] font-bold uppercase tracking-widest">ต้องถ่ายรูปหน้างานประกอบ *</p>
                    </div>
                </div>

                <button type="button" onclick="saveData()" class="w-full bg-indigo-700 text-white font-black py-5 rounded-[2rem] shadow-xl text-lg active:bg-indigo-950 active:scale-95 transition-all">บันทึกข้อมูลและส่ง Webex</button>
            </form>
        </div>
    </div>

    <div id="detailModal" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[60] hidden flex items-end sm:items-center justify-center p-4">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] sm:rounded-[2.5rem] max-h-[90vh] flex flex-col overflow-hidden shadow-2xl">
            <div class="p-6 border-b flex justify-between items-center bg-amber-50">
                <h3 class="font-bold text-amber-800 flex items-center gap-2"><i class="fas fa-id-card"></i> ข้อมูลลูกค้าเชิงลึก</h3>
                <button onclick="closeModal()" class="text-gray-400 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto space-y-3 text-sm"></div>
            <div class="p-4 bg-gray-50 grid grid-cols-2 gap-3 border-t">
                <button onclick="exportToPDF()" class="bg-rose-600 text-white py-3 rounded-2xl font-bold flex items-center justify-center gap-2 shadow-lg"><i class="fas fa-file-pdf"></i> ดาวน์โหลด PDF</button>
                <button onclick="closeModal()" class="bg-slate-200 text-slate-700 py-3 rounded-2xl font-bold">ปิด</button>
            </div>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-indigo-900/60 hidden flex flex-col items-center justify-center text-white z-[100]">
        <div class="w-12 h-12 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold tracking-widest animate-pulse text-center p-4 text-sm">กำลังบันทึกข้อมูลและอัปโหลดรูปภาพ...</p>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzK2OEux72xuX2Q1aAY7zohR4KyCVXQGXBgduQQk9B5h6QkO23veRuZz_vxyQDTyZFt8A/exec'; 
        let rawData = []; let filteredByOffice = []; let filteredByCount = [];

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            showLoader(true);
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                rawData = data; populateOffice(data); showLoader(false);
            }).catch(() => { showLoader(false); alert("โหลดข้อมูลผิดพลาด! กรุณาเช็คอินเทอร์เน็ต"); });
        };

        function saveData() {
            const fileInput = document.getElementById('pic');
            const file = fileInput.files[0];
            const staffId = document.getElementById('staff').value.trim();
            const locationVal = document.getElementById('locVal').value;
            const ca = document.getElementById('caSelect').value;
            const amount = document.getElementById('amt').value;

            // บังคับกรอกข้อมูล
            if(!ca || !amount || !staffId || !locationVal) return alert("⚠️ โปรดกรอกข้อมูลให้ครบ (เลือก CA, ยอดเงิน, พนักงาน, พิกัด)");
            if(!file) return alert("📷 กรุณาถ่ายรูปหน้างานก่อนบันทึกครับ");

            showLoader(true);
            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Data = e.target.result.split(',')[1];
                const p = {
                    ca: ca,
                    paymentAmount: amount,
                    paymentDate: document.getElementById('date').value,
                    details: document.getElementById('note').value,
                    staffId: staffId,
                    location: locationVal,
                    photoData: base64Data,
                    photoType: file.type,
                    photoName: file.name
                };

                // ส่งแบบ POST ปกติ (ถอด no-cors ออก)
                fetch(SCRIPT_URL, { 
                    method: "POST", 
                    body: JSON.stringify(p) 
                })
                .then(res => res.json())
                .then(res => {
                    showLoader(false);
                    if(res.status === "success") {
                        alert(`✅ บันทึกสำเร็จ!\nหมายเลข CA: ${res.ca}\nยอดหนี้คงเหลือใหม่: ${res.newDebt} บาท`);
                        location.reload();
                    } else {
                        alert("❌ หลังบ้านแจ้งข้อผิดพลาด: " + res.message);
                    }
                })
                .catch(err => {
                    showLoader(false);
                    alert("❌ ล้มเหลว: ระบบอาจมีปัญหาเรื่องสิทธิ์ DriveApp หรือเน็ตขัดข้อง");
                });
            };
            reader.readAsDataURL(file);
        }

        // --- ระบบกรองข้อมูล (Cascading Select) ---
        function populateOffice(data) {
            const select = document.getElementById('officeSelect');
            const offices = [...new Set(data.map(i => i.office))].sort();
            select.innerHTML = '<option value="">-- 1. เลือกสำนักงาน --</option>';
            offices.forEach(off => { const opt = document.createElement('option'); opt.value = off; opt.textContent = off; select.appendChild(opt); });
        }
        function onOfficeChange() {
            const office = document.getElementById('officeSelect').value;
            const countSection = document.getElementById('countSection');
            if (office) {
                filteredByOffice = rawData.filter(i => i.office === office);
                countSection.classList.remove('opacity-40', 'pointer-events-none');
                const counts = [...new Set(filteredByOffice.map(i => i.count))].sort((a,b) => a-b);
                const cSelect = document.getElementById('countSelect');
                cSelect.innerHTML = '<option value="">-- 2. เลือกจำนวนฉบับ --</option>';
                counts.forEach(c => { const opt = document.createElement('option'); opt.value = c; opt.textContent = c + " ฉบับ"; cSelect.appendChild(opt); });
            }
        }
        function onCountChange() {
            const count = document.getElementById('countSelect').value;
            const caSection = document.getElementById('caSection');
            if (count) {
                filteredByCount = filteredByOffice.filter(i => i.count === count);
                caSection.classList.remove('opacity-40', 'pointer-events-none');
                renderCA(filteredByCount);
            }
        }
        function renderCA(data) {
            const select = document.getElementById('caSelect');
            select.innerHTML = '<option value="">-- 3. เลือกหมายเลข CA --</option>';
            data.forEach(i => { const opt = document.createElement('option'); opt.value = i.ca; opt.textContent = `CA: ${i.ca} | ${i.name}`; select.appendChild(opt); });
        }
        function filterCA() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = filteredByCount.filter(i => i.ca.toLowerCase().includes(term) || i.name.toLowerCase().includes(term));
            renderCA(filtered);
        }
        function updateDebtDisplay() {
            const ca = document.getElementById('caSelect').value;
            const found = filteredByCount.find(i => i.ca === ca);
            document.getElementById('debtDisplay').innerText = found ? found.debt.toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
            document.getElementById('nameDisplay').innerText = found ? "ลูกค้า: " + found.name : "";
        }

        // --- ระบบพิกัดและรูปถ่าย ---
        function getLoc() {
            const l = document.getElementById('locLabel');
            if (navigator.geolocation) {
                l.innerText = "กำลังดึงพิกัด...";
                navigator.geolocation.getCurrentPosition(p => {
                    document.getElementById('locVal').value = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                    l.innerText = "ปักหมุดสำเร็จ ✅";
                }, () => alert("โปรดอนุญาตสิทธิ์ตำแหน่งบนมือถือด้วยครับ"));
            }
        }
        document.getElementById('pic').onchange = function() {
            if(this.files[0]) {
                document.getElementById('photoContainer').classList.replace('bg-rose-50', 'bg-emerald-50');
                document.getElementById('picPreview').innerHTML = `<i class='fas fa-check-circle text-emerald-500 text-2xl mb-1'></i><p class='text-[10px] font-bold text-emerald-600'>เลือกรูปสำเร็จแล้ว</p>`;
            }
        };

        // --- ระบบดูข้อมูลเชิงลึก & PDF ---
        function showCustomerDetails() {
            const ca = document.getElementById('caSelect').value;
            if (!ca) return alert("เลือก CA ก่อนครับ");
            const found = filteredByCount.find(i => i.ca === ca);
            const body = document.getElementById('modalBody');
            let html = `<div id="pdf-area"><h2 style="color:#1e1b4b; font-size:18px; font-weight:bold; margin-bottom:15px; border-bottom:2px solid #fbbf24; padding-bottom:5px;">ประวัติ CA: ${ca}</h2>`;
            for (const [key, value] of Object.entries(found.fullDetails)) {
                let displayValue = value;
                if (typeof value === 'string' && value.includes('drive.google.com')) {
                    let fileId = value.includes('id=') ? value.split('id=')[1] : value.split('/file/d/')[1]?.split('/')[0];
                    if (fileId) displayValue = `<img src="https://drive.google.com/uc?export=view&id=${fileId}" class="img-preview" onclick="window.open('${value}', '_blank')">`;
                }
                html += `<div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #f3f4f6; padding:8px 0; gap:10px;"><span style="color:#9ca3af; font-size:10px; font-weight:bold; text-transform:uppercase; min-width:80px;">${key}</span><span style="color:#1f2937; font-weight:bold; text-align:right;">${displayValue}</span></div>`;
            }
            body.innerHTML = html + "</div>";
            document.getElementById('detailModal').classList.remove('hidden');
            document.body.classList.add('modal-open');
        }
        function exportToPDF() {
            const element = document.getElementById('pdf-area');
            const ca = document.getElementById('caSelect').value;
            const opt = { margin: 10, filename: `Debt_CA_${ca}.pdf`, image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2 }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
            showLoader(true); html2pdf().set(opt).from(element).save().then(() => showLoader(false));
        }
        function closeModal() { document.getElementById('detailModal').classList.add('hidden'); document.body.classList.remove('modal-open'); }
        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
