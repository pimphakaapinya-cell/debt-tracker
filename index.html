<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Debt Tracker v6.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Anuphan:wght@400;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Anuphan', sans-serif; touch-action: manipulation; }</style>
</head>
<body class="bg-slate-50 min-h-screen">
    <div class="max-w-md mx-auto bg-white min-h-screen shadow-2xl flex flex-col">
        <div class="bg-indigo-900 p-6 text-white rounded-b-[2rem] shadow-lg sticky top-0 z-50 text-center">
            <h1 class="text-xl font-bold italic tracking-wider">DEBT TRACKER v6.0</h1>
            <p class="text-[10px] opacity-70 uppercase tracking-widest">Multi-Level Filtering System</p>
        </div>

        <div class="p-5 space-y-4 flex-1">
            <div class="space-y-1">
                <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1 font-black">1. เลือกสำนักงาน</label>
                <select id="officeSelect" onchange="onOfficeChange()" class="w-full p-4 bg-indigo-50 border-2 border-indigo-100 rounded-2xl font-bold text-indigo-900 outline-none">
                    <option value="">-- กำลังโหลดข้อมูล... --</option>
                </select>
            </div>

            <div id="countSection" class="space-y-1 opacity-40 pointer-events-none transition-all">
                <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1 font-black">2. เลือกจำนวนฉบับที่ค้าง</label>
                <select id="countSelect" onchange="onCountChange()" class="w-full p-4 bg-white border-2 border-indigo-50 rounded-2xl font-bold text-gray-700 outline-none">
                    <option value="">-- โปรดเลือกสำนักงานก่อน --</option>
                </select>
            </div>

            <div id="caSection" class="space-y-2 opacity-40 pointer-events-none transition-all">
                <label class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest ml-1 font-black">3. ค้นหา CA / ชื่อ</label>
                <input type="text" id="search" onkeyup="filterCA()" placeholder="พิมพ์เลข CA หรือ ชื่อ..." class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none">
                <select id="caSelect" onchange="updateDebtDisplay()" class="w-full p-4 border-2 border-slate-100 rounded-2xl font-bold text-gray-700 outline-none bg-white">
                    <option value="">-- โปรดเลือกจำนวนฉบับก่อน --</option>
                </select>
            </div>

            <div class="bg-gradient-to-br from-indigo-50 to-white p-5 rounded-3xl border border-indigo-100 shadow-inner">
                <p class="text-[10px] font-bold text-indigo-600 uppercase mb-1">ยอดค้างชำระปัจจุบัน</p>
                <div class="flex items-baseline gap-2">
                    <span id="debtDisplay" class="text-4xl font-black text-gray-800">0.00</span>
                    <span class="text-xs font-bold text-gray-400">บาท</span>
                </div>
                <p id="nameDisplay" class="text-sm text-indigo-500 font-bold mt-2"></p>
            </div>

            <form id="debtForm" class="space-y-4">
                <input type="number" id="amt" required placeholder="จำนวนเงินที่ชำระครั้งนี้" inputmode="decimal" class="w-full p-4 bg-white border border-gray-100 rounded-2xl text-xl font-bold text-indigo-700 outline-none">
                
                <div class="grid grid-cols-2 gap-2">
                    <input type="date" id="date" required class="p-3 bg-gray-50 rounded-xl text-xs border-none outline-none">
                    <input type="text" id="staff" placeholder="รหัสพนักงาน *" required class="p-3 bg-gray-50 rounded-xl text-xs border-none outline-none focus:ring-1 focus:ring-indigo-500">
                </div>

                <textarea id="note" placeholder="รายละเอียดติดตาม..." class="w-full p-3 bg-gray-50 rounded-xl text-xs border-none" rows="2"></textarea>

                <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                    <button type="button" onclick="getLoc()" class="w-full py-3 bg-white text-indigo-700 rounded-xl text-xs font-bold border border-indigo-100 shadow-sm active:scale-95 transition">
                        <i class="fas fa-location-crosshairs mr-1"></i> <span id="locLabel">ปักหมุดพิกัด *</span>
                    </button>
                    <div id="locDisplay" class="text-center text-[10px] font-mono text-indigo-600 mt-2 font-bold hidden"></div>
                    <input type="hidden" id="locVal">
                </div>

                <div class="relative border-2 border-dashed border-gray-200 rounded-2xl p-4 text-center">
                    <input type="file" id="pic" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer z-10">
                    <div id="picPreview" class="text-gray-400 py-2"><i class="fas fa-camera text-2xl mb-1"></i><p class="text-[10px] font-bold uppercase">แนบรูปถ่าย</p></div>
                </div>

                <button type="button" onclick="saveData()" class="w-full bg-indigo-700 text-white font-black py-5 rounded-[2rem] shadow-xl active:bg-indigo-950 active:scale-95 transition-all text-lg">บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

    <div id="loader" class="fixed inset-0 bg-indigo-900/60 backdrop-blur-sm hidden flex flex-col items-center justify-center text-white z-[100]">
        <div class="w-14 h-14 border-4 border-white border-t-transparent rounded-full animate-spin"></div>
        <p class="mt-4 font-bold tracking-widest text-lg">กำลังประมวลผลข้อมูล...</p>
    </div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxlEz8nCboNTl8YeBFaM2GflbZnKbYrm1LinyXxiS4-OazTvHY5t3hJvyWaYaESm0eBBA/exec'; 
        let rawData = []; 
        let filteredByOffice = [];
        let filteredByCount = [];

        window.onload = () => {
            document.getElementById('date').valueAsDate = new Date();
            showLoader(true);
            fetch(SCRIPT_URL).then(res => res.json()).then(data => {
                rawData = data; populateOffice(data); showLoader(false);
            }).catch(() => alert("โหลดข้อมูลล้มเหลว!"));
        };

        function populateOffice(data) {
            const select = document.getElementById('officeSelect');
            const offices = [...new Set(data.map(i => i.office))].sort();
            select.innerHTML = '<option value="">-- เลือกสำนักงาน --</option>';
            offices.forEach(off => {
                const opt = document.createElement('option'); opt.value = off; opt.textContent = off; select.appendChild(opt);
            });
        }

        function onOfficeChange() {
            const office = document.getElementById('officeSelect').value;
            const countSection = document.getElementById('countSection');
            const caSection = document.getElementById('caSection');
            
            if (office) {
                filteredByOffice = rawData.filter(i => i.office === office);
                countSection.classList.remove('opacity-40', 'pointer-events-none');
                
                // Populate จำนวนฉบับที่มีใน Office นั้น
                const counts = [...new Set(filteredByOffice.map(i => i.count))].sort((a,b) => a-b);
                const cSelect = document.getElementById('countSelect');
                cSelect.innerHTML = '<option value="">-- เลือกจำนวนฉบับ --</option>';
                counts.forEach(c => {
                    const opt = document.createElement('option'); opt.value = c; opt.textContent = c + " ฉบับ"; cSelect.appendChild(opt);
                });
            } else {
                countSection.classList.add('opacity-40', 'pointer-events-none');
                caSection.classList.add('opacity-40', 'pointer-events-none');
            }
        }

        function onCountChange() {
            const count = document.getElementById('countSelect').value;
            const caSection = document.getElementById('caSection');
            
            if (count) {
                filteredByCount = filteredByOffice.filter(i => i.count === count);
                caSection.classList.remove('opacity-40', 'pointer-events-none');
                renderCA(filteredByCount);
            } else {
                caSection.classList.add('opacity-40', 'pointer-events-none');
            }
        }

        function renderCA(data) {
            const select = document.getElementById('caSelect');
            select.innerHTML = '<option value="">-- เลือก CA / ชื่อ --</option>';
            data.forEach(i => {
                const opt = document.createElement('option'); opt.value = i.ca; opt.textContent = `CA: ${i.ca} | ${i.name}`; select.appendChild(opt);
            });
        }

        function filterCA() {
            const term = document.getElementById('search').value.toLowerCase();
            const filtered = filteredByCount.filter(i => i.ca.toLowerCase().includes(term) || i.name.toLowerCase().includes(term));
            renderCA(filtered);
        }

        function updateDebtDisplay() {
            const ca = document.getElementById('caSelect').value;
            const found = filteredByCount.find(i => i.ca === ca);
            document.getElementById('debtDisplay').innerText = found ? found.debt.toLocaleString(undefined, {minimumFractionDigits: 2}) : "0.00";
            document.getElementById('nameDisplay').innerText = found ? "ลูกค้า: " + found.name : "";
        }

        function getLoc() {
            const l = document.getElementById('locLabel'); const d = document.getElementById('locDisplay');
            if (navigator.geolocation) {
                l.innerText = "กำลังดึงพิกัด...";
                navigator.geolocation.getCurrentPosition(p => {
                    const coords = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                    document.getElementById('locVal').value = coords; l.innerText = "สำเร็จ ✅";
                    d.innerText = "พิกัด: " + coords; d.classList.remove('hidden');
                }, () => alert("เปิด GPS ด้วยครับ"), {enableHighAccuracy: true});
            }
        }

        document.getElementById('pic').onchange = function() {
            if(this.files[0]) document.getElementById('picPreview').innerHTML = `<p class='text-indigo-600 font-bold text-[10px] underline'>${this.files[0].name}</p>`;
        };

        function saveData() {
            const file = document.getElementById('pic').files[0];
            const staffId = document.getElementById('staff').value.trim();
            const p = {
                ca: document.getElementById('caSelect').value,
                paymentAmount: document.getElementById('amt').value,
                paymentDate: document.getElementById('date').value,
                details: document.getElementById('note').value,
                location: document.getElementById('locVal').value,
                staffId: staffId
            };

            if(!p.ca || !p.paymentAmount) return alert("⚠️ กรุณาเลือก CA และระบุจำนวนเงิน");
            if(!p.location) return alert("📍 กรุณาปักหมุดพิกัด");
            if(p.staffId === "") { alert("❌ กรุณากรอกรหัสพนักงาน"); return; }
            
            showLoader(true);
            if (file) {
                const r = new FileReader(); r.readAsDataURL(file);
                r.onload = () => { p.photoData = r.result.split(',')[1]; p.photoType = file.type; p.photoName = file.name; send(p); };
            } else { send(p); }
        }

        function send(p) {
            fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(p) })
                .then(res => res.json()).then(res => {
                    showLoader(false);
                    if(res.status === "success") { alert(`✅ สำเร็จ!\nยอดคงเหลือ: ${res.newDebt} บาท`); location.reload(); }
                    else { alert("❌ เกิดข้อผิดพลาด: " + res.message); }
                }).catch(() => { showLoader(false); alert("ส่งข้อมูลล้มเหลว!"); });
        }
        function showLoader(s) { document.getElementById('loader').style.display = s ? 'flex' : 'none'; }
    </script>
</body>
</html>
